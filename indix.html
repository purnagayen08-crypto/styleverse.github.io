<!DOCTYPE html>
<html>
<head>
    <title>Style Verse</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:#000;
            color:white;
        }
        header{
            padding:20px;
            text-align:center;
            font-size:32px;
            font-weight:bold;
            letter-spacing:4px;
            border-bottom:1px solid #333;
        }
        .hero{
            text-align:center;
            padding:80px 20px;
        }
        .hero h1{
            font-size:60px;
            margin-bottom:10px;
        }
        .hero p{
            color:#aaa;
            font-size:20px;
        }
        .btn{
            display:inline-block;
            margin-top:20px;
            padding:12px 25px;
            background:white;
            color:black;
            text-decoration:none;
            border-radius:10px;
            font-weight:bold;
        }
        .products{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:20px;
            padding:40px;
        }
        .card{
            background:#111;
            padding:20px;
            border-radius:15px;
            border:1px solid #333;
            text-align:center;
        }
        footer{
            text-align:center;
            padding:30px;
            border-top:1px solid #333;
            color:#aaa;
        }
    </style>
</head>
<body>

<header>STYLE VERSE</header>

<section class="hero">
    <h1>Own Your Style</h1>
    <p>Luxury black premium fashion for everyone</p>
    <a class="btn" href="#">Shop Now</a>
</section>

<section class="products">
    <div class="card">Premium T-Shirt</div>
    <div class="card">Luxury Hoodie</div>
    <div class="card">Classic Shirt</div>
    <div class="card">Urban Jeans</div>
</section>

<footer>
    WhatsApp: 7551013184 | Instagram: @style_verse_2.0
</footer>

</body>
</html>
